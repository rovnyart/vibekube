              key: API_TOKEN
      command:
        - /bin/sh
        - -c
        - |
          pod="${POD_NAME:-$(hostname)}"
          echo "{\"ts\":\"$(date -Iseconds)\",\"level\":\"info\",\"component\":\"crashloop-fixture\",\"pod\":\"${pod}\",\"message\":\"starting controlled failure run\"}"
          i=0
          while [ "$i" -lt 3 ]; do
            echo "{\"ts\":\"$(date -Iseconds)\",\"level\":\"warn\",\"component\":\"crashloop-fixture\",\"pod\":\"${pod}\",\"message\":\"about to exit\",\"count\":${i}}"
