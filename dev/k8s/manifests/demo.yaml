  name: log-counter
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: log-counter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: log-counter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: log-counter
    spec:
      serviceAccountName: demo-runner
      containers:
        - name: counter
          image: busybox:1.36
          env:
            - name: APP_ENV
              value: "demo"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: demo-runtime-config
                  key: LOG_LEVEL
            - name: LOG_INTERVAL_SECONDS
              value: "2"
