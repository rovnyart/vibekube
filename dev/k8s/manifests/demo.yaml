apiVersion: v1
kind: Namespace
metadata:
  name: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-runtime-config
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
    app.kubernetes.io/name: demo-runtime-config
data:
  APP_MODE: "demo"
  ENV_FROM_CONFIG_VALUE: "expanded-from-configmap-envfrom"
  FEATURE_FLAGS: "env-panel,secret-reveal,configmap-ref"
  LOG_LEVEL: "debug"
  PUBLIC_GREETING: "hello-from-configmap"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-web-settings
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
    app.kubernetes.io/name: echo-web-settings
data:
  NGINX_ENTRYPOINT_QUIET_LOGS: "1"
  WEB_THEME: "liquid-glass-demo"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-web-nginx-config
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
    app.kubernetes.io/name: echo-web-nginx-config
data:
  nginx.conf: |
    user nginx;
    worker_processes 1;
    error_log /dev/stderr warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      access_log off;
      sendfile on;
      keepalive_timeout 65;
      include /etc/nginx/conf.d/*.conf;
    }
  default.conf: |
    server {
      listen 80;
      server_name _;

      access_log off;
      error_log /dev/stderr warn;

      location / {
        default_type text/plain;
        return 200 "vibekube echo-web\n";
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: demo-credentials
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
    app.kubernetes.io/name: demo-credentials
type: Opaque
stringData:
  API_TOKEN: "vk_demo_token_reveal_me"
  DB_PASSWORD: "vibekube-demo-password"
  LICENSE_KEY: "license-demo-123"
---
apiVersion: v1
kind: Secret
metadata:
  name: demo-envfrom-secret
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
    app.kubernetes.io/name: demo-envfrom-secret
type: Opaque
stringData:
  ENV_FROM_SECRET_TOKEN: "expanded-from-secret-envfrom"
  PAYMENT_KEY: "secret-from-envfrom"
  WEBHOOK_SECRET: "envfrom-webhook-secret"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-web
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: echo-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: echo-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: echo-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          command:
            - nginx
          args:
            - -g
            - daemon off;
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          env:
            - name: APP_ENV
              value: "development"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CPU_LIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
            - name: PUBLIC_GREETING
              valueFrom:
                configMapKeyRef:
                  name: demo-runtime-config
                  key: PUBLIC_GREETING
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-credentials
                  key: DB_PASSWORD
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: demo-credentials
                  key: API_TOKEN
          envFrom:
            - configMapRef:
                name: demo-runtime-config
            - prefix: ECHO_
              configMapRef:
                name: echo-web-settings
            - prefix: SECRET_BUNDLE_
              secretRef:
                name: demo-envfrom-secret
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: nginx-config
          configMap:
            name: echo-web-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: echo-web
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: echo-web
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: echo-web
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-counter
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: log-counter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: log-counter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: log-counter
    spec:
      containers:
        - name: counter
          image: busybox:1.36
          env:
            - name: APP_ENV
              value: "demo"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: demo-runtime-config
                  key: LOG_LEVEL
            - name: LOG_INTERVAL_SECONDS
              value: "2"
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: demo-credentials
                  key: API_TOKEN
          envFrom:
            - configMapRef:
                name: demo-runtime-config
            - prefix: DEMO_SECRET_
              secretRef:
                name: demo-envfrom-secret
          command:
            - /bin/sh
            - -c
            - |
              i=0
              while true; do
                ts="$(date -Iseconds)"
                pod="${POD_NAME:-$(hostname)}"
                printf '{"ts":"%s","level":"%s","message":"vibekube demo log line","counter":%s,"pod":"%s","env":"%s","component":"log-counter","flags":["jsonl","demo"],"details":{"namespace":"vibekube-demo","publicGreeting":"%s"}}\n' "$ts" "${LOG_LEVEL:-debug}" "$i" "$pod" "${APP_ENV:-unset}" "${PUBLIC_GREETING:-unset}"
                i=$((i + 1))
                sleep "${LOG_INTERVAL_SECONDS:-2}"
              done
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tiny-heartbeat
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: tiny-heartbeat
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: heartbeat
              image: busybox:1.36
              env:
                - name: HEARTBEAT_MESSAGE
                  value: "vibekube env inspector demo"
                - name: FEATURE_FLAGS
                  valueFrom:
                    configMapKeyRef:
                      name: demo-runtime-config
                      key: FEATURE_FLAGS
                - name: LICENSE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: demo-credentials
                      key: LICENSE_KEY
              envFrom:
                - prefix: HEARTBEAT_
                  configMapRef:
                    name: demo-runtime-config
                - prefix: HEARTBEAT_SECRET_
                  secretRef:
                    name: demo-envfrom-secret
              command:
                - /bin/sh
                - -c
                - echo "$(date -Iseconds) ${HEARTBEAT_MESSAGE} flags=${FEATURE_FLAGS:-unset}"
              resources:
                requests:
                  cpu: 5m
                  memory: 8Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
