apiVersion: v1
kind: Pod
metadata:
  name: crashloop-previous-logs
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
    app.kubernetes.io/name: crashloop-previous-logs
    app.kubernetes.io/component: debugging-fixture
spec:
  serviceAccountName: demo-runner
  restartPolicy: Always
  containers:
    - name: crashing-worker
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: APP_MODE
          valueFrom:
            configMapKeyRef:
              name: demo-runtime-config
              key: APP_MODE
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: demo-credentials
              key: API_TOKEN
      command:
        - /bin/sh
        - -c
        - |
          pod="${POD_NAME:-$(hostname)}"
          echo "{\"ts\":\"$(date -Iseconds)\",\"level\":\"info\",\"component\":\"crashloop-fixture\",\"pod\":\"${pod}\",\"message\":\"starting controlled failure run\"}"
          i=0
          while [ "$i" -lt 3 ]; do
            echo "{\"ts\":\"$(date -Iseconds)\",\"level\":\"warn\",\"component\":\"crashloop-fixture\",\"pod\":\"${pod}\",\"message\":\"about to exit\",\"count\":${i}}"
            i=$((i + 1))
            sleep 1
          done
          echo "{\"ts\":\"$(date -Iseconds)\",\"level\":\"error\",\"component\":\"crashloop-fixture\",\"pod\":\"${pod}\",\"message\":\"intentional exit for previous-log testing\",\"exitCode\":42}"
          exit 42
      livenessProbe:
        exec:
          command:
            - /bin/sh
            - -c
            - test -f /etc/demo/APP_MODE || true
        periodSeconds: 5
        timeoutSeconds: 1
        failureThreshold: 3
      volumeMounts:
        - name: runtime-config
          mountPath: /etc/demo
          readOnly: true
      resources:
        requests:
          cpu: 5m
          memory: 8Mi
        limits:
          cpu: 50m
          memory: 32Mi
  volumes:
    - name: runtime-config
      configMap:
        name: demo-runtime-config
---
