apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-counter
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: log-counter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: log-counter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: log-counter
    spec:
      serviceAccountName: demo-runner
      containers:
        - name: counter
          image: busybox:1.36
          env:
            - name: APP_ENV
              value: "demo"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: demo-runtime-config
                  key: LOG_LEVEL
            - name: LOG_INTERVAL_SECONDS
              value: "2"
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: demo-credentials
                  key: API_TOKEN
          envFrom:
            - configMapRef:
                name: demo-runtime-config
            - prefix: DEMO_SECRET_
              secretRef:
                name: demo-envfrom-secret
          command:
            - /bin/sh
            - -c
            - |
              i=0
              while true; do
                ts="$(date -Iseconds)"
                pod="${POD_NAME:-$(hostname)}"
                printf '{"ts":"%s","level":"%s","message":"vibekube demo log line","counter":%s,"pod":"%s","env":"%s","component":"log-counter","flags":["jsonl","demo"],"details":{"namespace":"vibekube-demo","publicGreeting":"%s"}}\n' "$ts" "${LOG_LEVEL:-debug}" "$i" "$pod" "${APP_ENV:-unset}" "${PUBLIC_GREETING:-unset}"
                i=$((i + 1))
                sleep "${LOG_INTERVAL_SECONDS:-2}"
              done
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
