apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-web-settings
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
    app.kubernetes.io/name: echo-web-settings
data:
  NGINX_ENTRYPOINT_QUIET_LOGS: "1"
  WEB_THEME: "liquid-glass-demo"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-web-nginx-config
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
    app.kubernetes.io/name: echo-web-nginx-config
data:
  nginx.conf: |
    user nginx;
    worker_processes 1;
    error_log /dev/stderr warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      access_log off;
      sendfile on;
      keepalive_timeout 65;
      include /etc/nginx/conf.d/*.conf;
    }
  default.conf: |
    server {
      listen 80;
      server_name _;

      access_log off;
      error_log /dev/stderr warn;

      location / {
        default_type text/plain;
        return 200 "vibekube echo-web\n";
      }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: demo-credentials
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
    app.kubernetes.io/name: demo-credentials
type: Opaque
stringData:
  API_TOKEN: "vk_demo_token_reveal_me"
  DB_PASSWORD: "vibekube-demo-password"
  LICENSE_KEY: "license-demo-123"
---
apiVersion: v1
kind: Secret
metadata:
  name: demo-envfrom-secret
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
    app.kubernetes.io/name: demo-envfrom-secret
type: Opaque
stringData:
  ENV_FROM_SECRET_TOKEN: "expanded-from-secret-envfrom"
  PAYMENT_KEY: "secret-from-envfrom"
  WEBHOOK_SECRET: "envfrom-webhook-secret"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-web
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: echo-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: echo-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: echo-web
    spec:
      serviceAccountName: demo-runner
      initContainers:
        - name: prepare-runtime
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "prepared-at=$(date -Iseconds)" > /work/runtime.txt
              echo "echo-web init container completed"
          volumeMounts:
            - name: runtime-work
              mountPath: /work
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          command:
            - nginx
          args:
            - -g
            - daemon off;
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: runtime-work
              mountPath: /var/run/vibekube-demo
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          env:
            - name: APP_ENV
              value: "development"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CPU_LIMIT
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
            - name: PUBLIC_GREETING
              valueFrom:
                configMapKeyRef:
                  name: demo-runtime-config
                  key: PUBLIC_GREETING
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-credentials
                  key: DB_PASSWORD
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: demo-credentials
                  key: API_TOKEN
          envFrom:
            - configMapRef:
                name: demo-runtime-config
            - prefix: ECHO_
              configMapRef:
                name: echo-web-settings
            - prefix: SECRET_BUNDLE_
              secretRef:
                name: demo-envfrom-secret
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: runtime-work
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: echo-web-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: stateful-cache
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: stateful-cache
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: stateful-cache
  ports:
    - name: tcp
      port: 8080
      targetPort: tcp
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stateful-cache
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
    app.kubernetes.io/name: stateful-cache
    app.kubernetes.io/component: workload-fixture
spec:
  replicas: 2
  serviceName: stateful-cache
  selector:
    matchLabels:
      app.kubernetes.io/name: stateful-cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stateful-cache
    spec:
      serviceAccountName: demo-runner
      containers:
        - name: cache
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          ports:
            - name: tcp
              containerPort: 8080
          command:
            - /bin/sh
            - -c
            - |
              echo "stateful-cache ordinal ${HOSTNAME##*-} ready"
              while true; do sleep 3600; done
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -n "$HOSTNAME"
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
