apiVersion: v1
kind: Namespace
metadata:
  name: vibekube-demo
  labels:
    app.kubernetes.io/part-of: vibekube
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-web
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: echo-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: echo-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: echo-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: echo-web
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: echo-web
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: echo-web
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-counter
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: log-counter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: log-counter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: log-counter
    spec:
      containers:
        - name: counter
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              i=0
              while true; do
                echo "$(date -Iseconds) vibekube demo log line $i from $(hostname)"
                i=$((i + 1))
                sleep 2
              done
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tiny-heartbeat
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: tiny-heartbeat
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: heartbeat
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - echo "$(date -Iseconds) vibekube heartbeat job finished"
              resources:
                requests:
                  cpu: 5m
                  memory: 8Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
