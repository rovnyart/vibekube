    app.kubernetes.io/name: crashloop-previous-logs
    app.kubernetes.io/component: debugging-fixture
spec:
  serviceAccountName: demo-runner
  restartPolicy: Always
  containers:
    - name: crashing-worker
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: APP_MODE
          valueFrom:
            configMapKeyRef:
              name: demo-runtime-config
