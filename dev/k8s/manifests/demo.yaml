            - prefix: DEMO_SECRET_
              secretRef:
                name: demo-envfrom-secret
          command:
            - /bin/sh
            - -c
            - |
              i=0
              while true; do
                ts="$(date -Iseconds)"
                pod="${POD_NAME:-$(hostname)}"
                printf '{"ts":"%s","level":"%s","message":"vibekube demo log line","counter":%s,"pod":"%s","env":"%s","component":"log-counter","flags":["jsonl","demo"],"details":{"namespace":"vibekube-demo","publicGreeting":"%s"}}\n' "$ts" "${LOG_LEVEL:-debug}" "$i" "$pod" "${APP_ENV:-unset}" "${PUBLIC_GREETING:-unset}"
                i=$((i + 1))
                sleep "${LOG_INTERVAL_SECONDS:-2}"
              done
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
