apiVersion: batch/v1
kind: CronJob
metadata:
  name: tiny-heartbeat
  namespace: vibekube-demo
  labels:
    app.kubernetes.io/name: tiny-heartbeat
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          serviceAccountName: demo-runner
          restartPolicy: Never
          containers:
            - name: heartbeat
              image: busybox:1.36
              env:
                - name: HEARTBEAT_MESSAGE
                  value: "vibekube env inspector demo"
                - name: FEATURE_FLAGS
                  valueFrom:
                    configMapKeyRef:
                      name: demo-runtime-config
                      key: FEATURE_FLAGS
                - name: LICENSE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: demo-credentials
                      key: LICENSE_KEY
              envFrom:
                - prefix: HEARTBEAT_
                  configMapRef:
                    name: demo-runtime-config
                - prefix: HEARTBEAT_SECRET_
                  secretRef:
                    name: demo-envfrom-secret
              command:
                - /bin/sh
                - -c
                - echo "$(date -Iseconds) ${HEARTBEAT_MESSAGE} flags=${FEATURE_FLAGS:-unset}"
              resources:
                requests:
                  cpu: 5m
                  memory: 8Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
